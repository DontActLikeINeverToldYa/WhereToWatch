<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Where to Watch</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: #0f0f0f;
      color: #e4e0d8;
      font-family: 'DM Sans', 'Helvetica Neue', sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    .container {
      max-width: 680px;
      margin: 0 auto;
      padding: 40px 20px 80px;
    }

    /* Header */
    header { text-align: center; margin-bottom: 32px; }
    header svg { opacity: 0.45; margin-bottom: 8px; }
    h1 { font-size: 28px; font-weight: 700; letter-spacing: -0.5px; color: #f5f2ec; }
    .subtitle { font-size: 14px; color: #706b63; margin-top: 5px; }

    /* Search */
    .controls { margin-bottom: 28px; display: flex; flex-direction: column; gap: 8px; }
    .search-row { display: flex; gap: 8px; }
    .search-row input {
      flex: 1; padding: 14px 16px; font-size: 16px; border: 1px solid #2a2a2a;
      border-radius: 10px; background: #1a1a1a; color: #e4e0d8; outline: none;
      font-family: inherit; transition: border-color 0.2s;
    }
    .search-row input:focus { border-color: #444; }
    .search-row button {
      padding: 14px 26px; font-size: 15px; font-weight: 600; border: none;
      border-radius: 10px; background: #e4e0d8; color: #0f0f0f; cursor: pointer;
      font-family: inherit; white-space: nowrap; min-width: 85px; transition: opacity 0.2s;
    }
    .search-row button:hover { opacity: 0.85; }
    .search-row button:disabled { opacity: 0.5; cursor: default; }
    .country-select {
      padding: 10px 14px; font-size: 14px; border: 1px solid #2a2a2a; border-radius: 10px;
      background: #1a1a1a; color: #e4e0d8; font-family: inherit; outline: none;
      cursor: pointer; width: 100%;
    }

    /* Loading */
    .loading { text-align: center; padding: 40px 0; }
    .bar-outer {
      width: 180px; height: 3px; background: #222; border-radius: 3px;
      margin: 0 auto 16px; overflow: hidden;
    }
    .bar-inner {
      width: 35%; height: 100%; background: #e4e0d8; border-radius: 3px;
      animation: slide 1.4s ease-in-out infinite;
    }
    @keyframes slide { 0%{transform:translateX(-150%)} 100%{transform:translateX(300%)} }
    .loading p { font-size: 14px; color: #8a857d; }

    /* Results grid */
    .results-grid {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(145px, 1fr));
      gap: 12px; margin-bottom: 28px;
    }
    .movie-card {
      display: flex; flex-direction: column; background: #1a1a1a; border: 1px solid #2a2a2a;
      border-radius: 10px; overflow: hidden; cursor: pointer; text-align: left;
      color: inherit; font-family: inherit; transition: border-color 0.2s, transform 0.15s;
    }
    .movie-card:hover { border-color: #444; transform: scale(1.02); }
    .movie-card.active { border-color: #e4e0d8; transform: scale(1.02); }
    .movie-card img {
      width: 100%; aspect-ratio: 2/3; object-fit: cover; display: block;
    }
    .no-poster {
      width: 100%; aspect-ratio: 2/3; display: flex; align-items: center;
      justify-content: center; background: #222; color: #555; font-size: 12px;
    }
    .card-info { padding: 10px 10px 12px; }
    .card-title {
      font-size: 13px; font-weight: 600; line-height: 1.3;
      display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
    }
    .card-year { font-size: 12px; color: #8a857d; margin-top: 2px; }

    /* Detail section */
    .detail {
      background: #1a1a1a; border-radius: 16px; border: 1px solid #2a2a2a;
      overflow: hidden; animation: fadeIn 0.3s ease;
    }
    @keyframes fadeIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
    .detail-top { position: relative; min-height: 160px; }
    .backdrop {
      position: absolute; inset: 0; background-size: cover;
      background-position: center top; opacity: 0.3; filter: blur(2px);
    }
    .detail-overlay {
      position: relative; padding: 24px 22px 20px;
      background: linear-gradient(to bottom, rgba(26,26,26,0.3), #1a1a1a);
    }
    .detail-row { display: flex; gap: 18px; align-items: flex-start; }
    .detail-poster {
      width: 110px; border-radius: 8px; flex-shrink: 0;
      box-shadow: 0 4px 24px rgba(0,0,0,0.5);
    }
    .detail-meta { flex: 1; min-width: 0; }
    .detail-title { font-size: 22px; font-weight: 700; line-height: 1.2; color: #f5f2ec; }
    .tags { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 10px; }
    .tag {
      font-size: 11px; padding: 4px 10px; border-radius: 20px;
      background: #2a2a2a; color: #a09a90; font-weight: 500;
    }
    .overview {
      font-size: 13px; line-height: 1.6; color: #706b63; margin-top: 12px;
      display: -webkit-box; -webkit-line-clamp: 4; -webkit-box-orient: vertical; overflow: hidden;
    }

    /* Providers */
    .divider { height: 1px; background: #2a2a2a; margin: 0 22px; }
    .prov-section { padding: 22px; }
    .prov-country-row { display: flex; align-items: center; gap: 10px; margin-bottom: 18px; }
    .prov-country-row label { font-size: 13px; color: #8a857d; font-weight: 500; }
    .prov-country-row select {
      padding: 8px 12px; font-size: 14px; border: 1px solid #2a2a2a; border-radius: 8px;
      background: #0f0f0f; color: #e4e0d8; font-family: inherit; outline: none; cursor: pointer;
    }
    .prov-categories { display: flex; flex-direction: column; gap: 22px; }
    .cat-badge {
      display: inline-block; font-size: 11px; font-weight: 700; padding: 5px 14px;
      border-radius: 20px; color: #fff; margin-bottom: 10px;
      text-transform: uppercase; letter-spacing: 0.5px;
    }
    .prov-list { display: flex; flex-wrap: wrap; gap: 10px; }
    .prov-item {
      display: flex; align-items: center; gap: 8px; background: #222;
      border-radius: 10px; padding: 8px 14px 8px 8px;
    }
    .prov-logo { width: 36px; height: 36px; border-radius: 8px; object-fit: cover; }
    .prov-name { font-size: 13px; font-weight: 500; }
    .jw-link {
      display: inline-block; margin-top: 14px; font-size: 13px; color: #e4e0d8;
      text-decoration: underline; text-underline-offset: 3px; opacity: 0.6;
      transition: opacity 0.2s;
    }
    .jw-link:hover { opacity: 1; }
    .no-prov { font-size: 14px; color: #706b63; padding: 24px 0; text-align: center; line-height: 1.6; }
    .attr { font-size: 11px; color: #3a3a3a; margin-top: 22px; text-align: center; }

    .empty { text-align: center; color: #706b63; font-size: 14px; padding: 40px 0; }
    .error-box {
      text-align: center; padding: 20px; background: #1a1212;
      border-radius: 12px; border: 1px solid #3a1818; margin-bottom: 20px;
    }
    .error-box p { color: #ef4444; font-size: 14px; margin-bottom: 10px; }
    .error-box button {
      padding: 7px 18px; font-size: 13px; font-weight: 600; border: 1px solid #ef4444;
      border-radius: 8px; background: transparent; color: #ef4444; cursor: pointer; font-family: inherit;
    }

    @media (max-width: 500px) {
      .detail-poster { width: 80px; }
      .detail-title { font-size: 18px; }
      .results-grid { grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <svg width="26" height="26" viewBox="0 0 26 26" fill="none">
        <rect x="2" y="4" width="22" height="18" rx="3" stroke="#c8c3b8" stroke-width="1.5"/>
        <circle cx="8" cy="13" r="2" fill="#c8c3b8"/><circle cx="18" cy="13" r="2" fill="#c8c3b8"/>
        <rect x="11" y="7" width="4" height="12" rx="1" fill="#c8c3b8"/>
      </svg>
      <h1>Where to Watch</h1>
      <p class="subtitle">Finally an easy way to know where the movie you want to watch is available</p>
    </header>

    <div class="controls">
      <div class="search-row">
        <input id="searchInput" type="text" placeholder="Enter a movie title…" autocomplete="off"/>
        <button id="searchBtn" onclick="doSearch()">Search</button>
      </div>
      <select id="countrySelect" class="country-select"></select>
    </div>

    <div id="loading" class="loading" style="display:none">
      <div class="bar-outer"><div class="bar-inner"></div></div>
      <p>Searching…</p>
    </div>

    <div id="error" class="error-box" style="display:none">
      <p id="errorMsg"></p>
      <button onclick="doSearch()">Retry</button>
    </div>

    <div id="resultsGrid" class="results-grid" style="display:none"></div>
    <div id="detail" class="detail" style="display:none"></div>
  </div>

<script>
// ─── CONFIG ───
const IMG = "https://image.tmdb.org/t/p";

const API_BASE = "/api";

const COUNTRIES = {
  DE:"Germany",US:"United States",GB:"United Kingdom",FR:"France",ES:"Spain",
  IT:"Italy",NL:"Netherlands",AT:"Austria",CH:"Switzerland",CA:"Canada",
  AU:"Australia",BR:"Brazil",IN:"India",JP:"Japan",KR:"South Korea",
  MX:"Mexico",SE:"Sweden",NO:"Norway",PL:"Poland",TR:"Turkey",PT:"Portugal",
  DK:"Denmark",FI:"Finland",BE:"Belgium",IE:"Ireland",AR:"Argentina",
  CL:"Chile",CO:"Colombia",ZA:"South Africa",SG:"Singapore",TH:"Thailand",
};

const CAT_META = {
  flatrate: { label:"Stream",  color:"#22c55e" },
  ads:      { label:"Free with Ads", color:"#8b5cf6" },
  rent:     { label:"Rent",    color:"#f59e0b" },
  buy:      { label:"Buy",     color:"#ef4444" },
};

// ─── STATE ───
let selectedMovieId = null;

// ─── INIT ───
const countrySelect = document.getElementById("countrySelect");
Object.entries(COUNTRIES).forEach(([code, name]) => {
  const opt = document.createElement("option");
  opt.value = code; opt.textContent = `${name} (${code})`;
  countrySelect.appendChild(opt);
});
countrySelect.value = "DE";
countrySelect.addEventListener("change", () => {
  if (selectedMovieId) loadProviders(selectedMovieId);
});

document.getElementById("searchInput").addEventListener("keydown", e => {
  if (e.key === "Enter") doSearch();
});
document.getElementById("searchInput").focus();

// ─── API ───
async function apiFetch(path) {
  const res = await fetch(`${API_BASE}${path}`);
  if (!res.ok) {
    let msg = `Request failed (${res.status})`;
    try {
      const err = await res.json();
      if (err?.error) msg = err.error;
    } catch (_) {}
    throw new Error(msg);
  }
  return res.json();
}

// ─── SEARCH ───
async function doSearch() {
  const q = document.getElementById("searchInput").value.trim();
  if (!q) return;

  show("loading"); hide("error"); hide("resultsGrid"); hide("detail");
  selectedMovieId = null;
  document.getElementById("searchBtn").disabled = true;

  try {
    const data = await apiFetch(`/search?query=${encodeURIComponent(q)}&language=en-US&page=1`);
    const movies = (data.results || []).slice(0, 12);
    hide("loading");
    document.getElementById("searchBtn").disabled = false;

    if (!movies.length) {
      document.getElementById("resultsGrid").innerHTML = '';
      show("resultsGrid");
      document.getElementById("resultsGrid").innerHTML = '<p class="empty">No movies found. Try a different title.</p>';
      return;
    }

    renderGrid(movies);
  } catch (e) {
    hide("loading");
    document.getElementById("searchBtn").disabled = false;
    showError(e.message);
  }
}

function renderGrid(movies) {
  const grid = document.getElementById("resultsGrid");
  grid.innerHTML = movies.map(m => `
    <button class="movie-card" data-id="${m.id}" onclick="selectMovie(${m.id})">
      ${m.poster_path
        ? `<img src="${IMG}/w300${m.poster_path}" alt="${esc(m.title)}" loading="lazy"/>`
        : `<div class="no-poster">No Poster</div>`}
      <div class="card-info">
        <div class="card-title">${esc(m.title)}</div>
        <div class="card-year">${m.release_date?.slice(0,4) || "—"}</div>
      </div>
    </button>
  `).join("");
  show("resultsGrid");
}

// ─── SELECT MOVIE ───
async function selectMovie(id) {
  selectedMovieId = id;

  // highlight active card
  document.querySelectorAll(".movie-card").forEach(c => c.classList.remove("active"));
  document.querySelector(`[data-id="${id}"]`)?.classList.add("active");

  const detail = document.getElementById("detail");
  detail.innerHTML = '<div class="loading"><div class="bar-outer"><div class="bar-inner"></div></div><p>Loading details…</p></div>';
  show("detail");

  try {
    const [movie, provData] = await Promise.all([
      apiFetch(`/movie?id=${encodeURIComponent(id)}&language=en-US`),
      apiFetch(`/providers?id=${encodeURIComponent(id)}`),
    ]);
    renderDetail(movie, provData.results || {});
    detail.scrollIntoView({ behavior: "smooth", block: "start" });
  } catch (e) {
    detail.innerHTML = `<div class="error-box"><p>${esc(e.message)}</p><button onclick="selectMovie(${id})">Retry</button></div>`;
  }
}

async function loadProviders(id) {
  try {
    const movie = await apiFetch(`/movie?id=${encodeURIComponent(id)}&language=en-US`);
    const provData = await apiFetch(`/providers?id=${encodeURIComponent(id)}`);
    renderDetail(movie, provData.results || {});
  } catch(e) { /* silently fail on country change */ }
}

function renderDetail(movie, allProviders) {
  const country = countrySelect.value;
  const prov = allProviders[country];
  const availableCountries = Object.keys(allProviders).sort();

  let provHTML = "";
  if (prov) {
    let cats = "";
    ["flatrate","ads","rent","buy"].forEach(cat => {
      if (prov[cat]?.length) {
        const m = CAT_META[cat];
        cats += `
          <div>
            <div class="cat-badge" style="background:${m.color}">${m.label}</div>
            <div class="prov-list">
              ${prov[cat].map(p => `
                <div class="prov-item">
                  ${p.logo_path ? `<img class="prov-logo" src="${IMG}/w92${p.logo_path}" alt="${esc(p.provider_name)}"/>` : ""}
                  <span class="prov-name">${esc(p.provider_name)}</span>
                </div>
              `).join("")}
            </div>
          </div>`;
      }
    });

    if (cats) {
      provHTML = `<div class="prov-categories">${cats}</div>`;
      if (prov.link) {
        provHTML += `<a class="jw-link" href="${prov.link}" target="_blank" rel="noopener">View on JustWatch →</a>`;
      }
    } else {
      provHTML = `<p class="no-prov">No streaming options found for <strong>${COUNTRIES[country] || country}</strong>.</p>`;
    }
  } else {
    provHTML = `<p class="no-prov">No data available for <strong>${COUNTRIES[country] || country}</strong>. Try a different country.</p>`;
  }

  // Country selector for providers
  let countryOptions = availableCountries.map(c =>
    `<option value="${c}" ${c===country?"selected":""}>${COUNTRIES[c] || c} (${c})</option>`
  ).join("");
  // Ensure current selection is available
  if (!availableCountries.includes(country)) {
    countryOptions = `<option value="${country}" selected>${COUNTRIES[country]||country} (${country})</option>` + countryOptions;
  }

  document.getElementById("detail").innerHTML = `
    <div class="detail-top">
      ${movie.backdrop_path ? `<div class="backdrop" style="background-image:url(${IMG}/w780${movie.backdrop_path})"></div>` : ""}
      <div class="detail-overlay">
        <div class="detail-row">
          ${movie.poster_path ? `<img class="detail-poster" src="${IMG}/w200${movie.poster_path}" alt=""/>` : ""}
          <div class="detail-meta">
            <div class="detail-title">${esc(movie.title)}</div>
            <div class="tags">
              ${movie.release_date ? `<span class="tag">${movie.release_date.slice(0,4)}</span>` : ""}
              ${movie.runtime > 0 ? `<span class="tag">${movie.runtime} min</span>` : ""}
              ${movie.vote_average > 0 ? `<span class="tag">★ ${movie.vote_average.toFixed(1)}</span>` : ""}
              ${(movie.genres||[]).map(g => `<span class="tag">${esc(g.name)}</span>`).join("")}
            </div>
            ${movie.overview ? `<p class="overview">${esc(movie.overview)}</p>` : ""}
          </div>
        </div>
      </div>
    </div>
    <div class="divider"></div>
    <div class="prov-section">
      <div class="prov-country-row">
        <label>Country:</label>
        <select onchange="countrySelect.value=this.value;loadProviders(${movie.id})">
          ${countryOptions}
        </select>
      </div>
      ${provHTML}
      <p class="attr">Streaming data by JustWatch via TMDB</p>
    </div>
  `;
}

// ─── HELPERS ───
function show(id) { document.getElementById(id).style.display = ""; }
function hide(id) { document.getElementById(id).style.display = "none"; }
function showError(msg) {
  document.getElementById("errorMsg").textContent = msg;
  show("error");
}
function esc(s) {
  const d = document.createElement("div"); d.textContent = s || ""; return d.innerHTML;
}
</script>
</body>
</html>
